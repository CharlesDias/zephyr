description: ST Digital camera interface (DCMI)

compatible: "st,stm32-dcmi"

include: [base.yaml, pinctrl-device.yaml]

properties:
  interrupts:
    required: true

  sensor:
    required: true
    type: phandle
    description: phandle of connected sensor device

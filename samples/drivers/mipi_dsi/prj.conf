# Enable logging
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=8192
# CONFIG_LOG_DEFAULT_LEVEL=3
# CONFIG_LOG_MODE_IMMEDIATE=y

# Main thread configuration
CONFIG_MAIN_STACK_SIZE=8192

# Display configuration
CONFIG_DISPLAY=y
CONFIG_MIPI_DSI=y
CONFIG_STM32_LTDC_ARGB8888=y
CONFIG_DISPLAY_INIT_PRIORITY=85
CONFIG_MIPI_DSI_INIT_PRIORITY=86
CONFIG_DISPLAY_HX8379C_INIT_PRIORITY=87

# CONFIG_ARM_MPU=n

# Debugging and optimization settings
# CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_MIPI_DSI_LOG_LEVEL_DBG=y
CONFIG_DISPLAY_LOG_LEVEL_DBG=y

CONFIG_DEBUG_OPTIMIZATIONS=y

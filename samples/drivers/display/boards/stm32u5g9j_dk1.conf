CONFIG_DISPLAY=y
CONFIG_MIPI_DSI=y
CONFIG_MIPI_DSI_STM32=y
CONFIG_STM32_LTDC=y
CONFIG_GPIO=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_MIPI_DSI_LOG_LEVEL_DBG=y
CONFIG_DISPLAY_LOG_LEVEL_DBG=y
# CONFIG_DISPLAY_LOG_LEVEL=4

CONFIG_DISPLAY_INIT_PRIORITY=86

# Increase log buffer to avoid dropping messages
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=5120

# Memory management for frame buffer (480x480x4 = ~900KB + overhead)
CONFIG_HEAP_MEM_POOL_SIZE=1048576

# Increase main stack size for DSI initialization
CONFIG_MAIN_STACK_SIZE=4096

# Enable ARGB8888 pixel format for STM32 LTDC
CONFIG_STM32_LTDC_ARGB8888=y

# Uncomment to set the number of frame buffers (0-2)
# This can help with double buffering or triple buffering scenarios.
CONFIG_STM32_LTDC_FB_NUM=1

# SerDes loopback validation: MAX96717 PATGEN -> GMSL2 -> MAX96724 passthrough
# -> CSI-2 -> DCMIPP -> display
CONFIG_APP_TPG_MODE=y

# DCMIPP must be told to expect 800x480 RGB888 from its remote subdevice.
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_PIXEL_FORMAT="BGR3"
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_WIDTH=800
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_HEIGHT=480

# An 800x480 RGB24 frame is 1152000 bytes; double-buffer + slack.
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=2500000

# Render frames on the on-board LTDC display.
CONFIG_DISPLAY=y
CONFIG_STM32_LTDC=y
CONFIG_STM32_LTDC_RGB888=y

# Enable the serializer PATGEN as the frame source.
CONFIG_VIDEO_MAX96717=y
CONFIG_VIDEO_MAX96717_PATGEN_ENABLE=y
CONFIG_VIDEO_MAX96717_PATGEN_PATTERN_GRADIENT=y

# Deserializer runs in passthrough mode — no internal VPG.
CONFIG_VIDEO_MAX96724=y
CONFIG_VIDEO_MAX96724_VPG_INTERNAL=n

# The GMSL link must be locked — no tolerance for missing serializer.
CONFIG_VIDEO_MAX96724_TPG_TOLERATE_NO_LINK=n

# TPG validation mode: MAX96724 internal test pattern → CSI-2 → DCMIPP → display
CONFIG_APP_TPG_MODE=y

# DCMIPP must be told to expect 800x480 RGB888 from its remote subdevice
# (the MAX96724 in VPG mode). Sized to fill the on-board LTDC panel.
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_PIXEL_FORMAT="BGR3"
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_WIDTH=800
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_HEIGHT=480

# An 800x480 RGB24 frame is 1152000 bytes; double-buffer + slack.
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=2500000

# Render frames on the on-board LTDC display.
CONFIG_DISPLAY=y
CONFIG_STM32_LTDC=y

# The VPG produces RGB24, so size the LTDC framebuffer for 3 bytes/pixel.
# Without this the driver defaults to RGB565 (2 bytes/pixel) and the runtime
# display_set_pixel_format() switch overruns the back buffer.
CONFIG_STM32_LTDC_RGB888=y

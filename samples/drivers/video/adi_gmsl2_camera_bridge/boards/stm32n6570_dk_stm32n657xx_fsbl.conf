# IMX219 through GMSL2 — capture + display
# DCMIPP source sensor format (IMX219 native)
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_PIXEL_FORMAT="pBAA"
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_WIDTH=3280
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_HEIGHT=2464

# Deserializer in passthrough mode (not VPG)
CONFIG_VIDEO_MAX96724_VPG_INTERNAL=n
CONFIG_VIDEO_MAX96724_TPG_TOLERATE_NO_LINK=n

# An 800x480 RGB24 frame is 1152000 bytes; double-buffer + slack.
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=2500000

# Render frames on the on-board LTDC display.
CONFIG_DISPLAY=y
CONFIG_STM32_LTDC=y
CONFIG_STM32_LTDC_RGB888=y

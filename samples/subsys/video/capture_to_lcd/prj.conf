CONFIG_VIDEO=y
# CONFIG_VIDEO_SW_GENERATOR=y
# CONFIG_SHELL=y
# CONFIG_DEVICE_SHELL=y
CONFIG_PRINTK=y
CONFIG_LOG=y

# Set up Enable the Master Clock Output 1 to 12MHz
CONFIG_CLOCK_STM32_MCO1_SRC_HSI48=y
CONFIG_CLOCK_STM32_MCO1_DIV=4

# Increase the log buffer size
# CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_BUFFER_SIZE=2048

CONFIG_VIDEO_BUFFER_POOL_SZ_MAX=204800

